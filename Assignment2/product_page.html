<!DOCTYPE html>
<html>
<head>

<title>Products</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.product{
background:white;
padding:10px;
text-align:center;
border-radius:10px;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

</style>
</head>

<body>

<h2 style="text-align:center;">Products</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>Laptop</h3>
<p>₹65000</p>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Smartphone</h3>
<p>₹30000</p>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Smart Watch</h3>
<p>₹12000</p>
</div>

</div>

</body>
</html>
